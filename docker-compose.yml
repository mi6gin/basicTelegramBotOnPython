services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nihao_chan_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
